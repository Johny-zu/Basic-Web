<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inputs</title>
    <link rel="stylesheet" href="../CSS/style.css">

</head>
<body>
    <div>
        <h2>Tipo 1 de formulario</h2>
        <p>Formularios textules: </p><li></li>
        <form action="">
            <label for="nombre">Nombre: </label>
            <input type="text" name="nombre" id="nombre">
            <li></li>
            <label for="apellido">Apellido: </label>
            <input type="text" name="apellido" id="apellido">
            <li></li>
            <label for="email">Email: </label>
            <input type="email" name="email" id="email">
            <li></li>
            <label for="pass">Contraseña: </label>
            <input type="password" name="pass" id="pass">
            <li></li>
            <input type="submit" value="Enviar" name="" id="">
            <input type="reset" name="" id="">
        </form>
    </div>
    <div>
        <h2>Tipo 2 de formularios</h2>
        <form action="">
            <p>Formularios de opcion: </p> <li></li>
            <label for="rojo">Rojo</label>
            <input type="radio" name="color" value="rojo" id="rojo">
            <li></li>
            <label for="verde">Verde</label>
            <input type="radio" name="color" value="verde" id="verde">
            <li></li>
            <label for="azul">Azul</label>
            <input type="radio" name="color" value="azul" id="azul">
            <li></li>
            <input type="reset" name="" id="">
        </form>
    </div>
    <div>
        <h2>Tipo de formulario 3</h2>
        <p>Formulario por boton</p><li></li>
        <form action="">
            <button>Boton</button><br>
            <label for="">Seleccion de color: </label>
            <input type="color" name="color2" id=""><br>
            <label for="">Seleccion de fecha: </label>
            <input type="date" name="date" id=""><br>
            <label for="">Seleccion de fecha detallada: </label>
            <input type="datetime-local" name="datetime-local" id=""><br>
            <label for="">Seleccion de fichero: </label>
            <input type="file" name="fichero" id=""><br>
            <label for="">Seleccion de mes: </label> 
            <input type="month" name="month"><br>
            <label for="">Seleccion de numero: </label> 
            <input type="number" name="numero"><br>
            <label for="">Seleccion de rango: </label>
            <input type="range" name="rango" min="0" max="5" id=""><br>
            <label for="">Busqueda: </label>
            <input type="search" name="rango" id=""><br>
            <label for="">Telefono: </label>
            <input type="tel" name="telefono" id=""><br>
            <label for="">Hora: </label>
            <input type="time" name="hora" id=""><br>
            <label for="">Hora: </label>
            <input type="url" name="url" id=""><br>
            <li></li>
            <input type="reset" name="" id="">
        </form>
    </div>
</body>
</html>
